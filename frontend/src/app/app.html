<div class="crm-layout">
  <aside class="sidebar glass-card">
    <div class="logo">
      <div class="logo-icon">IG</div>
      <span>CRM Assistant</span>
    </div>
    
    <nav class="nav-links">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <span class="icon">📊</span> Dashboard
      </a>
      <a routerLink="/leads" routerLinkActive="active" class="nav-item">
        <span class="icon">👥</span> Leads
      </a>
      <a routerLink="/inbox" routerLinkActive="active" class="nav-item">
        <span class="icon">💬</span> Inbox
      </a>
      <a routerLink="/settings" routerLinkActive="active" class="nav-item">
        <span class="icon">⚙️</span> Settings
      </a>
    </nav>

    <div class="user-info">
      <div class="avatar">Admin</div>
      <div class="details">
        <p class="name">Varun Anand</p>
        <p class="role">System Owner</p>
      </div>
    </div>
  </aside>

  <main class="content-area">
    <header class="top-header glass-card">
      <div class="search-bar">
        <span>🔍</span>
        <input type="text" placeholder="Search leads or messages...">
      </div>
      <div class="notifications">
        <span class="badge">3</span>
        🔔
      </div>
    </header>

    <div class="router-container">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
